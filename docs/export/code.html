<script>
        // Optional micro-interaction: Subtle progress bar simulation
        const progressBar = document.querySelector('.bg-primary-container.progress-glow');
        const progressText = document.querySelector('.text-primary.font-label-lg');
        let currentProgress = 45;

        const animateProgress = () => {
            if (currentProgress < 98) {
                currentProgress += (Math.random() * 0.5);
                progressBar.style.width = `${currentProgress}%`;
                progressText.innerText = `${Math.floor(currentProgress)}%`;
            }
            requestAnimationFrame(animateProgress);
        };
        
        // Start animation after a short delay
        setTimeout(animateProgress, 1000);
    </script>

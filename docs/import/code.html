<script>
        function toggleSelection(el) {
            const isSelected = el.classList.toggle('selected');
            const indicator = el.querySelector('.absolute.top-2.right-2');
            
            if (isSelected) {
                indicator.className = 'absolute top-2 right-2 w-6 h-6 bg-primary rounded-full flex items-center justify-center border-2 border-white';
                indicator.innerHTML = '<span class="material-symbols-outlined text-white text-[16px]" style="font-variation-settings: \'wght\' 700;">check</span>';
            } else {
                indicator.className = 'absolute top-2 right-2 w-6 h-6 bg-black/20 border-2 border-white/40 rounded-full';
                indicator.innerHTML = '';
            }
            
            // Update the Import Button count
            const selectedCount = document.querySelectorAll('.clip-item.selected').length;
            const importBtn = document.querySelector('button.bg-primary-container');
            if (importBtn) {
                importBtn.innerHTML = `Import (${selectedCount}) <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>`;
                importBtn.style.opacity = selectedCount > 0 ? '1' : '0.5';
                importBtn.parentElement.style.opacity = selectedCount > 0 ? '1' : '0';
                importBtn.style.pointerEvents = selectedCount > 0 ? 'auto' : 'none';
            }
        }

        function switchTab(btn) {
            const parent = btn.parentElement;
            const buttons = parent.querySelectorAll('button');
            buttons.forEach(b => {
                b.className = 'flex-1 py-1.5 text-label-lg rounded-md transition-all text-outline hover:text-on-surface';
            });
            btn.className = 'flex-1 py-1.5 text-label-lg rounded-md transition-all font-bold bg-surface-bright text-on-surface ios-segment-active';
        }
    </script>
